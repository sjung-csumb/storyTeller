<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 동화 만들기 - 캐릭터 설정</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Pretendard:wght@400;600;700&display=swap');
        body {
            font-family: 'Pretendard', sans-serif;
        }
    </style>
</head>
<body class="bg-stone-300 text-white min-h-screen flex flex-col items-center justify-center p-6">

    <div class="w-full max-w-md bg-gray-50 rounded-2xl p-8 shadow-2xl border border-black">
        
        <div class="text-center mb-8">
            <div class="flex justify-center items-center gap-2 mb-2">
                <span class="w-2 h-2 rounded-full bg-amber-400"></span>
                <span class="w-2 h-2 rounded-full bg-gray-600"></span>
                <span class="w-2 h-2 rounded-full bg-gray-600"></span>
            </div>
            <span class="text-xs font-semibold tracking-wider text-amber-400 uppercase">STAGE 1 / 3</span>
            <h1 class="text-2xl font-bold mt-1 text-black">📖 AI 동화만들기 프로젝트</h1>
            <p class="text-xs text-gray-400 mt-1">이야기의 주인공을 설정해 주세요</p>
        </div>

        <form class="space-y-6">
            
            <!-- 1. 주인공 이름 -->
            <div>
                <label class="block text-sm font-medium text-black mb-2">주인공 이름</label>
                <input type="text" placeholder="예: 김사과" 
                    class="w-full bg-white border border-gray-700 rounded-3xl px-4 py-3 text-white placeholder-gray-500 focus:outline-none focus:border-amber-400 transition-colors">
            </div>

            <!-- 2. 나이 선택 (3세, 4세, 5세) -->
            <div>
                <label class="block text-sm font-medium text-black mb-2">나이</label>
                <!-- 항목이 3개이므로 grid-cols-2에서 grid-cols-3으로 변경 -->
                <div class="grid grid-cols-3 gap-2">
                    <label class="relative flex items-center justify-center bg-white border border-gray-700 rounded-xl p-3 cursor-pointer hover:border-gray-500 transition-all has-[:checked]:border-amber-400 has-[:checked]:bg-amber-400/10">
                        <input type="radio" name="age" value="3" class="absolute opacity-0 peer">
                        <span class="text-sm font-medium text-gray-400 peer-checked:text-amber-400 peer-checked:font-bold">3세</span>
                    </label>
                    <label class="relative flex items-center justify-center bg-white border border-gray-700 rounded-xl p-3 cursor-pointer hover:border-gray-500 transition-all has-[:checked]:border-amber-400 has-[:checked]:bg-amber-400/10">
                        <input type="radio" name="age" value="4" class="absolute opacity-0 peer">
                        <span class="text-sm font-medium text-gray-400 peer-checked:text-amber-400 peer-checked:font-bold">4세</span>
                    </label>
                    <label class="relative flex items-center justify-center bg-white border border-gray-700 rounded-xl p-3 cursor-pointer hover:border-gray-500 transition-all has-[:checked]:border-amber-400 has-[:checked]:bg-amber-400/10">
                        <input type="radio" name="age" value="5" class="absolute opacity-0 peer">
                        <span class="text-sm font-medium text-gray-400 peer-checked:text-amber-400 peer-checked:font-bold">5세</span>
                    </label>
                </div>
            </div>

            <!-- 3. 성별 선택 -->
            <div>
                <label class="block text-sm font-medium text-black mb-2">성별</label>
                <div class="flex gap-2">
                    <label class="flex-1 relative flex items-center justify-center bg-white border border-gray-700 rounded-xl p-3 cursor-pointer hover:border-gray-500 transition-all has-[:checked]:border-amber-400 has-[:checked]:bg-amber-400/10">
                        <input type="radio" name="gender" value="none" class="absolute opacity-0 peer" checked>
                        <span class="text-sm font-medium text-gray-400 peer-checked:text-amber-400 peer-checked:font-bold">선택 안함</span>
                    </label>
                    <label class="flex-1 relative flex items-center justify-center bg-white border border-gray-700 rounded-xl p-3 cursor-pointer hover:border-gray-500 transition-all has-[:checked]:border-amber-400 has-[:checked]:bg-amber-400/10">
                        <input type="radio" name="gender" value="male" class="absolute opacity-0 peer">
                        <span class="text-sm font-medium text-gray-400 peer-checked:text-amber-400 peer-checked:font-bold">남</span>
                    </label>
                    <label class="flex-1 relative flex items-center justify-center bg-white border border-gray-700 rounded-xl p-3 cursor-pointer hover:border-gray-500 transition-all has-[:checked]:border-amber-400 has-[:checked]:bg-amber-400/10">
                        <input type="radio" name="gender" value="female" class="absolute opacity-0 peer">
                        <span class="text-sm font-medium text-gray-400 peer-checked:text-amber-400 peer-checked:font-bold">여</span>
                    </label>
                </div>
            </div>

            <button type="button" class="w-full bg-amber-400 hover:bg-amber-300 text-gray-900 font-bold py-4 rounded-xl shadow-lg hover:shadow-amber-400/20 transition-all mt-4 flex items-center justify-center gap-2">
                다음 단계로 이동 ➜
            </button>
        </form>

    </div>
</body>
</html>
