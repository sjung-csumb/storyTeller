<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 동화 만들기 - 캐릭터 설정</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-[#0B0F19] text-white min-h-screen flex flex-col items-center justify-center p-6">

    <div class="w-full max-w-md bg-[#131B2E] rounded-2xl p-8 shadow-2xl border border-gray-800">
        
        <div class="text-center mb-8">
            <span class="text-xs font-semibold tracking-wider text-amber-400 uppercase">STAGE 1 / 3</span>
            <h1 class="text-2xl font-bold mt-1 text-gray-100">📖 AI 동화만들기 프로젝트</h1>
            <p class="text-xs text-gray-400 mt-1">이야기의 주인공을 설정해 주세요</p>
        </div>

        <form class="space-y-6">
            
            <div>
                <label class="block text-sm font-medium text-gray-300 mb-2">주인공 이름</label>
                <input type="text" placeholder="예: 김말랑" 
                    class="w-full bg-[#1F293D] border border-gray-700 rounded-xl px-4 py-3 text-white placeholder-gray-500 focus:outline-none focus:border-amber-400 transition-colors">
            </div>

            <div>
                <label class="block text-sm font-medium text-gray-300 mb-2">나이대</label>
                <div class="grid grid-cols-2 gap-2">
                    <label class="relative flex items-center justify-center bg-[#1F293D] border border-gray-700 rounded-xl p-3 cursor-pointer hover:border-gray-500 transition-all">
                        <input type="radio" name="age" value="low" class="absolute opacity-0 peer">
                        <span class="text-sm font-medium text-gray-400 peer-checked:text-amber-400 peer-checked:font-bold">초등 저학년</span>
                    </label>
                    <label class="relative flex items-center justify-center bg-[#1F293D] border border-gray-700 rounded-xl p-3 cursor-pointer hover:border-gray-500 transition-all">
                        <input type="radio" name="age" value="high" class="absolute opacity-0 peer">
                        <span class="text-sm font-medium text-gray-400 peer-checked:text-amber-400 peer-checked:font-bold">초등 고학년</span>
                    </label>
                    </div>
            </div>

            <button type="button" class="w-full bg-amber-400 hover:bg-amber-300 text-gray-900 font-bold py-4 rounded-xl shadow-lg transition-all mt-4">
                다음 단계로 이동 ➜
            </button>
        </form>
    </div>
</body>
</html>
