version: '3.8'

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: fairytale_backend
    ports:
      - "8000:8000"
    # env_file: 
    #   - .env # 필요시 환경변수 파일 연동
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: fairytale_frontend
    ports:
      - "8501:8501"
    depends_on:
      - backend
    restart: unless-stopped
