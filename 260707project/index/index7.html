<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 동화 만들기 - 전체 흐름</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @font-face {
            font-family: 'OngleipParkDahyeon';
            src: url('https://cdn.jsdelivr.net/gh/projectnoonnu/2411-3@1.0/Ownglyph_ParkDaHyun.woff2') format('woff2');
            font-weight: normal;
            font-display: swap;
        }

        body {
            font-family: 'OngleipParkDahyeon', sans-serif;
        }
    
        .fade-in {
            animation: fadeIn 0.4s ease-in-out;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .hidden-stage {
            display: none !important;
        }

        .float-cloud {
            animation: floatCloud 3s ease-in-out infinite;
        }
        @keyframes floatCloud {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-8px); }
            100% { transform: translateY(0px); }
        }

        /* --- 새로 추가된 책 디자인 및 넘김 효과 CSS --- */
        .book-wrapper {
            perspective: 1500px;
            transform-style: preserve-3d;
            width: 100%;
            height: 480px;
            position: relative;
            margin: 0 auto;
        }

        .book-page {
            width: 100%;
            height: 100%;
            position: absolute;
            top: 0;
            left: 0;
            background-color: #fdfbf7;
            border-left: 14px solid #d6c3a3; /* 책등(Spine) 느낌 */
            border-radius: 4px 18px 18px 4px;
            box-shadow: inset 4px 0 10px rgba(0,0,0,0.03), 5px 5px 15px rgba(0,0,0,0.08);
            transform-origin: left center;
            transition: transform 0.4s ease, box-shadow 0.4s ease;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* 책 끝부분 호버 시 들리는 효과 */
        .book-page.lift-right {
            transform: rotateY(-3deg) rotateX(1deg);
            box-shadow: inset 4px 0 10px rgba(0,0,0,0.03), 12px 12px 25px rgba(0,0,0,0.15);
        }
        .book-page.lift-left {
            transform: rotateY(3deg) rotateX(1deg);
            box-shadow: inset 4px 0 10px rgba(0,0,0,0.03), -5px 12px 25px rgba(0,0,0,0.15);
        }

        /* 페이지 넘김 애니메이션 */
        .turning-next {
            animation: flipNext 0.6s ease-in-out forwards;
        }
        .turning-prev {
            animation: flipPrev 0.6s ease-in-out forwards;
        }

        @keyframes flipNext {
            0% { transform: rotateY(0deg); opacity: 1; }
            49% { transform: rotateY(-90deg); opacity: 0; }
            50% { transform: rotateY(90deg); opacity: 0; }
            100% { transform: rotateY(0deg); opacity: 1; }
        }
        
        @keyframes flipPrev {
            0% { transform: rotateY(0deg); opacity: 1; }
            49% { transform: rotateY(90deg); opacity: 0; }
            50% { transform: rotateY(-90deg); opacity: 0; }
            100% { transform: rotateY(0deg); opacity: 1; }
        }

        /* 클릭 감지 영역 (투명) */
        .nav-area {
            position: absolute;
            top: 0;
            width: 25%;
            height: 100%;
            z-index: 20;
            cursor: pointer;
            display: flex;
            align-items: center;
        }
        .nav-area-left { left: 0; justify-content: flex-start; padding-left: 1rem; }
        .nav-area-right { right: 0; justify-content: flex-end; padding-right: 1rem; }

        .nav-hint {
            opacity: 0;
            transition: opacity 0.3s;
            color: #d6c3a3;
            background: rgba(255,255,255,0.8);
            border-radius: 50%;
            padding: 8px;
        }
        .nav-area:hover .nav-hint { opacity: 1; }
    </style>
</head>
<body class="bg-stone-100 text-gray-800 min-h-screen flex flex-col items-center justify-center p-6">

    <div class="w-full max-w-xl bg-white rounded-3xl p-10 shadow-xl border border-stone-200 relative overflow-hidden">
        
        <div id="stage1" class="fade-in">
            <div class="text-center mb-8">
                <div class="flex justify-center items-center gap-2 mb-2">
                    <span class="w-2 h-2 rounded-full bg-amber-400"></span>
                    <span class="w-2 h-2 rounded-full bg-gray-200"></span>
                    <span class="w-2 h-2 rounded-full bg-gray-200"></span>
                </div>
                <span class="text-xs font-semibold tracking-wider text-amber-500 uppercase">STAGE 1 / 3</span>
                <h1 class="text-3xl font-bold mt-1 text-gray-800">📖 AI 동화만들기 프로젝트</h1>
                <p class="text-2sm text-gray-500 mt-1">이야기의 주인공을 설정해 주세요</p>
            </div>

            <form class="space-y-6" onsubmit="event.preventDefault(); goToStage(2);">
                <div>
                    <label class="block text-xl font-semibold text-gray-700 mb-2">주인공 이름</label>
                    <input type="text" id="heroNameInput" placeholder="예: 김사과" 
                        class="w-full bg-stone-50 border border-stone-200 rounded-[20px] px-4 py-3 text-lg text-gray-800 placeholder-gray-400 focus:outline-none focus:border-amber-400 focus:bg-white transition-colors" required>
                </div>

                <div>
                    <label class="block text-xl font-semibold text-gray-700 mb-2">나이</label>
                    <div class="grid grid-cols-4 gap-2">
                        <label class="relative flex items-center justify-center bg-stone-50 border border-stone-200 rounded-xl py-1.5 px-2 cursor-pointer hover:border-stone-300 transition-all has-[:checked]:border-amber-400 has-[:checked]:bg-amber-50">
                            <input type="radio" name="age" value="3" class="absolute opacity-0 peer">
                            <span class="text-lg font-medium text-gray-500 peer-checked:text-amber-600 peer-checked:font-bold">3세</span>
                        </label>
                        <label class="relative flex items-center justify-center bg-stone-50 border border-stone-200 rounded-xl py-1.5 px-2 cursor-pointer hover:border-stone-300 transition-all has-[:checked]:border-amber-400 has-[:checked]:bg-amber-50">
                            <input type="radio" name="age" value="4" class="absolute opacity-0 peer">
                            <span class="text-lg font-medium text-gray-500 peer-checked:text-amber-600 peer-checked:font-bold">4세</span>
                        </label>
                        <label class="relative flex items-center justify-center bg-stone-50 border border-stone-200 rounded-xl py-1.5 px-2 cursor-pointer hover:border-stone-300 transition-all has-[:checked]:border-amber-400 has-[:checked]:bg-amber-50">
                            <input type="radio" name="age" value="5" class="absolute opacity-0 peer">
                            <span class="text-lg font-medium text-gray-500 peer-checked:text-amber-600 peer-checked:font-bold">5세</span>
                        </label>
                        <label class="relative flex items-center justify-center bg-stone-50 border border-stone-200 rounded-xl py-1.5 px-2 cursor-pointer hover:border-stone-300 transition-all has-[:checked]:border-amber-400 has-[:checked]:bg-amber-50">
                            <input type="radio" name="age" value="6" class="absolute opacity-0 peer">
                            <span class="text-lg font-medium text-gray-500 peer-checked:text-amber-600 peer-checked:font-bold">6세</span>
                        </label>
                    </div>
                </div>

                <div>
                    <label class="block text-xl font-semibold text-gray-700 mb-2">성별</label>
                    <div class="flex gap-2">
                        <label class="flex-1 relative flex items-center justify-center bg-stone-50 border border-stone-200 rounded-xl p-3 cursor-pointer hover:border-stone-300 transition-all has-[:checked]:border-amber-400 has-[:checked]:bg-amber-50">
                            <input type="radio" name="gender" value="none" class="absolute opacity-0 peer" checked>
                            <span class="text-lg font-medium text-gray-500 peer-checked:text-amber-600 peer-checked:font-bold">선택 안함</span>
                        </label>
                        <label class="flex-1 relative flex items-center justify-center bg-stone-50 border border-stone-200 rounded-xl p-3 cursor-pointer hover:border-stone-300 transition-all has-[:checked]:border-amber-400 has-[:checked]:bg-amber-50">
                            <input type="radio" name="gender" value="male" class="absolute opacity-0 peer">
                            <span class="text-lg font-medium text-gray-500 peer-checked:text-amber-600 peer-checked:font-bold">남</span>
                        </label>
                        <label class="flex-1 relative flex items-center justify-center bg-stone-50 border border-stone-200 rounded-xl p-3 cursor-pointer hover:border-stone-300 transition-all has-[:checked]:border-amber-400 has-[:checked]:bg-amber-50">
                            <input type="radio" name="gender" value="female" class="absolute opacity-0 peer">
                            <span class="text-lg font-medium text-gray-500 peer-checked:text-amber-600 peer-checked:font-bold">여</span>
                        </label>
                    </div>
                </div>

                <button type="submit" class="w-full bg-amber-400 hover:bg-amber-300 text-xl text-gray-900 font-bold py-4 rounded-[20px] shadow-sm hover:shadow-md transition-all mt-6 flex items-center justify-center gap-2">
                    다음 단계로 이동 ➜
                </button>
            </form>
        </div>

        <div id="stage2" class="hidden-stage fade-in">
            <div class="text-center mb-8">
                <div class="flex justify-center items-center gap-2 mb-2">
                    <span class="w-2 h-2 rounded-full bg-gray-200"></span>
                    <span class="w-2 h-2 rounded-full bg-amber-400"></span>
                    <span class="w-2 h-2 rounded-full bg-gray-200"></span>
                </div>
                <span class="text-xs font-semibold tracking-wider text-amber-500 uppercase">STAGE 2 / 3</span>
                <h2 class="text-3xl font-bold mt-1 text-gray-800">어떤 이야기인가요?</h2>
                <p class="text-2xs text-gray-500 mt-1">주인공과 배경에 대해 더 자세히 알려주세요</p>
            </div>

            <form class="space-y-4" onsubmit="event.preventDefault(); goToStage(3);">
                <div>
                    <label class="block text-xl font-semibold text-gray-700 mb-1">주인공의 외형</label>
                    <input type="text" placeholder="예: 빨간 모자를 쓰고 있어요" class="w-full bg-stone-50 border border-stone-200 rounded-[16px] px-4 py-2.5 text-lg text-gray-800 placeholder-gray-400 focus:outline-none focus:border-amber-400 focus:bg-white transition-colors" required>
                </div>
                <div>
                    <label class="block text-xl font-semibold text-gray-700 mb-1">주인공의 성격</label>
                    <input type="text" placeholder="예: 호기심이 많고 용감해요" class="w-full bg-stone-50 border border-stone-200 rounded-[16px] px-4 py-2.5 text-lg text-gray-800 placeholder-gray-400 focus:outline-none focus:border-amber-400 focus:bg-white transition-colors" required>
                </div>
                <div class="grid grid-cols-2 gap-3">
                    <div>
                        <label class="block text-xl font-semibold text-gray-700 mb-1">장소</label>
                        <input type="text" placeholder="예: 깊은 숲속" class="w-full bg-stone-50 border border-stone-200 rounded-[16px] px-4 py-2.5 text-lg text-gray-800 placeholder-gray-400 focus:outline-none focus:border-amber-400 focus:bg-white transition-colors" required>
                    </div>
                    <div>
                        <label class="block text-xl font-semibold text-gray-700 mb-1">시대</label>
                        <input type="text" placeholder="예: 아주 먼 옛날" class="w-full bg-stone-50 border border-stone-200 rounded-[16px] px-4 py-2.5 text-lg text-gray-800 placeholder-gray-400 focus:outline-none focus:border-amber-400 focus:bg-white transition-colors" required>
                    </div>
                </div>
                <div>
                    <label class="block text-xl font-semibold text-gray-700 mb-1">분위기</label>
                    <input type="text" placeholder="예: 신비롭고 따뜻한 느낌" class="w-full bg-stone-50 border border-stone-200 rounded-[16px] px-4 py-2.5 text-lg text-gray-800 placeholder-gray-400 focus:outline-none focus:border-amber-400 focus:bg-white transition-colors" required>
                </div>

                <div class="flex gap-3 mt-6">
                    <button type="button" onclick="goToStage(1)" class="w-1/3 bg-stone-100 hover:bg-stone-200 text-xl text-gray-600 font-bold py-4 rounded-[20px] transition-all flex items-center justify-center">이전</button>
                    <button type="submit" class="w-2/3 bg-amber-400 hover:bg-amber-300 text-xl text-gray-900 font-bold py-4 rounded-[20px] shadow-sm hover:shadow-md transition-all flex items-center justify-center gap-2">다음 단계로 ➜</button>
                </div>
            </form>
        </div>

        <div id="stage3" class="hidden-stage fade-in">
            <div class="text-center mb-8">
                <div class="flex justify-center items-center gap-2 mb-2">
                    <span class="w-2 h-2 rounded-full bg-gray-200"></span>
                    <span class="w-2 h-2 rounded-full bg-gray-200"></span>
                    <span class="w-2 h-2 rounded-full bg-amber-400"></span>
                </div>
                <span class="text-xs font-semibold tracking-wider text-amber-500 uppercase">STAGE 3 / 3</span>
                <h2 class="text-3xl font-bold mt-1 text-gray-800">어떤 일이 생겼나요?</h2>
                <p class="text-2xs text-gray-500 mt-1">주인공이 겪는 문제나 사건을 적어주세요</p>
            </div>

            <form class="space-y-6" onsubmit="event.preventDefault(); submitForm();">
                <div>
                    <label class="block text-xl font-semibold text-gray-700 mb-2">문제 상황</label>
                    <textarea rows="8" placeholder="예: 소중한 장난감을 잃어버려서 슬퍼하고 있어요. 친구들과 어떻게 화해해야 할지 모르겠어요." class="w-full bg-stone-50 border border-stone-200 rounded-[20px] px-4 py-4 text-lg text-gray-800 placeholder-gray-400 focus:outline-none focus:border-amber-400 focus:bg-white transition-colors resize-none" required></textarea>
                </div>

                <div class="flex gap-3 mt-6">
                    <button type="button" onclick="goToStage(2)" class="w-1/3 bg-stone-100 hover:bg-stone-200 text-xl text-gray-600 font-bold py-4 rounded-[20px] transition-all flex items-center justify-center">이전</button>
                    <button type="submit" class="w-2/3 bg-orange-400 hover:bg-orange-500 text-xl text-white font-bold py-4 rounded-[20px] shadow-md hover:shadow-lg transition-all flex items-center justify-center gap-2">✨ 이야기 만들기!</button>
                </div>
            </form>
        </div>

        <div id="stageLoading" class="hidden-stage text-center py-10 fade-in flex flex-col items-center justify-center">
            <div class="float-cloud w-20 h-20 bg-blue-100 text-blue-500 rounded-full flex items-center justify-center mb-6">
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="w-10 h-10">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M2.25 15a4.5 4.5 0 0 0 4.5 4.5H18a3.75 3.75 0 0 0 1.332-7.257 3 3 0 0 0-3.758-3.848 5.25 5.25 0 0 0-10.233 2.33A4.502 4.502 0 0 0 2.25 15Z" />
                </svg>
            </div>
            
            <h2 class="text-2xl font-bold text-gray-800 mb-2">동화 생성 중입니다...</h2>
            <p class="text-sm text-gray-500 mb-8" id="loadingStatusText">잠시만 기다려주세요!</p>
            
            <div class="w-full px-2">
                <div class="flex justify-between items-center mb-2">
                    <span class="text-xs font-semibold text-amber-500" id="loadingPhase">스토리 구상 중...</span>
                    <span class="text-sm font-bold text-gray-700" id="progressPercent">0%</span>
                </div>
                <div class="w-full h-3 bg-gray-200 rounded-full overflow-hidden">
                    <div id="progressBar" class="h-full bg-gradient-to-r from-amber-300 to-orange-400 rounded-full transition-all duration-300 ease-out" style="width: 0%;"></div>
                </div>
            </div>
        </div>

        <div id="stageBook" class="hidden-stage fade-in">
            <div class="text-center mb-4">
                <span class="text-sm font-semibold tracking-wider text-green-500 uppercase">✨ 완성된 동화책 ✨</span>
                <p class="text-xs text-gray-400 mt-1">모서리를 눌러 책장을 넘겨보세요</p>
            </div>
            
            <div class="bg-stone-200/50 p-4 rounded-3xl mb-6 shadow-inner relative">
                <div class="book-wrapper">
                    <div class="nav-area nav-area-left" onmouseenter="addLiftEffect('left')" onmouseleave="removeLiftEffect('left')" onclick="turnPage('prev')">
                        <svg class="nav-hint w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"></path></svg>
                    </div>
                    <div class="nav-area nav-area-right" onmouseenter="addLiftEffect('right')" onmouseleave="removeLiftEffect('right')" onclick="turnPage('next')">
                        <svg class="nav-hint w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"></path></svg>
                    </div>

                    <div id="bookPage" class="book-page">
                        <div id="pageIndicator" class="absolute top-4 right-5 text-sm text-stone-400 font-sans font-bold z-10">1 / 9</div>
                        
                        <div id="pageContent" class="w-full h-full p-6 flex flex-col items-center justify-center bg-white relative">
                            </div>
                    </div>
                </div>
            </div>

            <button type="button" onclick="location.reload()" class="w-full bg-stone-800 hover:bg-stone-700 text-white text-lg font-bold py-3.5 rounded-[20px] transition-all flex items-center justify-center gap-2">
                처음부터 다시 만들기 🔄
            </button>
        </div>

    </div> 

    <div id="customAlert" class="fixed inset-0 bg-stone-900/60 backdrop-blur-sm hidden flex items-center justify-center z-50 fade-in">
        <div class="bg-white rounded-[24px] p-8 max-w-sm w-full mx-4 shadow-2xl text-center">
            <div class="w-16 h-16 bg-amber-100 text-amber-500 rounded-full flex items-center justify-center mx-auto mb-4">
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" class="w-8 h-8">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M9.813 15.904 9 18.75l-.813-2.846a4.5 4.5 0 0 0-3.09-3.09L2.25 12l2.846-.813a4.5 4.5 0 0 0 3.09-3.09L9 5.25l.813 2.846a4.5 4.5 0 0 0 3.09 3.09L15.75 12l-2.846.813a4.5 4.5 0 0 0-3.09 3.09ZM18.259 8.715 18 9.75l-.259-1.035a3.375 3.375 0 0 0-2.455-2.456L14.25 6l1.036-.259a3.375 3.375 0 0 0 2.455-2.456L18 2.25l.259 1.035a3.375 3.375 0 0 0 2.456 2.456L21.75 6l-1.035.259a3.375 3.375 0 0 0-2.456 2.456ZM16.894 20.567 16.5 21.75l-.394-1.183a2.25 2.25 0 0 0-1.423-1.423L13.5 18.75l1.183-.394a2.25 2.25 0 0 0 1.423-1.423l.394-1.183.394 1.183a2.25 2.25 0 0 0 1.423 1.423l1.183.394-1.183.394a2.25 2.25 0 0 0-1.423 1.423Z" />
                </svg>
            </div>
            <h3 class="text-3xl font-bold text-stone-800 mb-2">동화 생성 시작!</h3>
            <p class="text-stone-500 text-lg mb-6">입력하신 정보로 예쁜 동화를<br>만들 준비를 마쳤어요.</p>
            <button type="button" onclick="closeAlertAndLoad()" class="w-full bg-amber-400 hover:bg-amber-300 text-stone-900 font-bold py-4 rounded-[18px] transition-all text-xl">
                확인
            </button>
        </div>
    </div>

    <script>
        // 전역 변수
        let heroName = "주인공";
        let currentPageIndex = 0;
        let isAnimating = false;
        
        // 동화 데이터 구조 (총 9페이지: 커버 1, 텍스트 4, 이미지 4)
        // 실제 백엔드 연동 시 이 배열을 응답값으로 교체하시면 됩니다.
        let storyPages = [];

        function goToStage(stageNumber) {
            document.getElementById('stage1').classList.add('hidden-stage');
            document.getElementById('stage2').classList.add('hidden-stage');
            document.getElementById('stage3').classList.add('hidden-stage');
            document.getElementById('stageLoading').classList.add('hidden-stage');
            document.getElementById('stageBook').classList.add('hidden-stage');
            document.getElementById('stage' + stageNumber).classList.remove('hidden-stage');
        }

        function submitForm() {
            document.getElementById('customAlert').classList.remove('hidden');
            const nameInput = document.getElementById('heroNameInput');
            if(nameInput && nameInput.value) {
                heroName = nameInput.value;
            }
        }

        function closeAlertAndLoad() {
            document.getElementById('customAlert').classList.add('hidden');
            goToStage('Loading');
            startProgressBar();
        }

        function startProgressBar() {
            let progress = 0;
            const progressBar = document.getElementById('progressBar');
            const progressPercent = document.getElementById('progressPercent');
            const loadingPhase = document.getElementById('loadingPhase');
            const loadingStatusText = document.getElementById('loadingStatusText');

            const interval = setInterval(() => {
                progress += Math.floor(Math.random() * 5) + 1; 
                if(progress > 100) progress = 100;

                progressBar.style.width = progress + '%';
                progressPercent.innerText = progress + '%';

                if(progress > 30 && progress < 70) {
                    loadingPhase.innerText = "예쁜 그림 그리는 중... 🎨";
                    loadingStatusText.innerText = "멋진 삽화를 생성하고 있어요!";
                } else if(progress >= 70 && progress < 100) {
                    loadingPhase.innerText = "동화책 엮는 중... 📚";
                    loadingStatusText.innerText = "이제 곧 완성됩니다!";
                }

                if (progress === 100) {
                    clearInterval(interval);
                    setTimeout(() => {
                        initBookData();
                        renderCurrentPage();
                        goToStage('Book');
                    }, 500);
                }
            }, 200);
        }

        // 책 데이터 초기화 세팅
        function initBookData() {
            const title = `✨ 용감한 ${heroName}의 모험 ✨`;
            // 백엔드 연동 전 사용할 더미(Dummy) 레이아웃 구성
            storyPages = [
                { type: 'cover', title: title, img: 'https://placehold.co/400x300/fcfaf8/a38865?text=Cover+Image' },
                { type: 'text', text: `어느 맑은 날, 깊은 숲속 마을에 사는 ${heroName}에게 아주 신기한 일이 벌어졌어요. 갑자기 나타난 반짝이는 요정이 도움을 요청했답니다.` },
                { type: 'image', img: 'https://placehold.co/400x400/fcfaf8/a38865?text=Image+2' },
                { type: 'text', text: '요정은 숲의 평화를 지켜주는 "별빛 구슬"을 잃어버려서 슬퍼하고 있었어요. 마음씨 따뜻한 주인공은 요정을 도와 구슬을 찾기로 결심했죠.' },
                { type: 'image', img: 'https://placehold.co/400x400/fcfaf8/a38865?text=Image+3' },
                { type: 'text', text: '험난한 가시덤불을 지나 도착한 깊은 동굴 안, 그곳에는 장난꾸러기 고블린이 구슬을 가지고 놀고 있었어요!' },
                { type: 'image', img: 'https://placehold.co/400x400/fcfaf8/a38865?text=Image+4' },
                { type: 'text', text: `${heroName}은(는) 지혜를 발휘해 고블린에게 재미있는 수수께끼를 내고, 무사히 별빛 구슬을 돌려받을 수 있었답니다.` },
                { type: 'image', img: 'https://placehold.co/400x400/fcfaf8/a38865?text=Image+5' }
            ];
            currentPageIndex = 0;
        }

        // 책 페이지 내용 렌더링
        function renderCurrentPage() {
            const pageData = storyPages[currentPageIndex];
            const contentContainer = document.getElementById('pageContent');
            document.getElementById('pageIndicator').innerText = `${currentPageIndex + 1} / ${storyPages.length}`;
            
            let htmlContent = '';

            if (pageData.type === 'cover') {
                htmlContent = `
                    <img src="${pageData.img}" alt="표지 이미지" class="w-full h-48 object-cover rounded-xl shadow-md mb-6 border border-stone-200">
                    <h2 class="text-3xl font-bold text-center text-stone-800 leading-tight">${pageData.title}</h2>
                `;
            } else if (pageData.type === 'image') {
                htmlContent = `
                    <img src="${pageData.img}" alt="삽화" class="w-full h-64 object-cover rounded-xl shadow-md border border-stone-200">
                `;
            } else if (pageData.type === 'text') {
                htmlContent = `
                    <div class="px-4 py-6 w-full h-full flex items-center justify-center">
                        <p class="text-2xl text-stone-700 leading-loose text-center break-keep">
                            ${pageData.text}
                        </p>
                    </div>
                `;
            }

            contentContainer.innerHTML = htmlContent;
        }

        // 책장 넘김 함수
        function turnPage(direction) {
            if (isAnimating) return;
            if (direction === 'next' && currentPageIndex >= storyPages.length - 1) return;
            if (direction === 'prev' && currentPageIndex <= 0) return;

            isAnimating = true;
            const pageEl = document.getElementById('bookPage');
            
            // 방향에 따른 애니메이션 클래스 부여
            const turnClass = direction === 'next' ? 'turning-next' : 'turning-prev';
            pageEl.classList.add(turnClass);
            
            // 애니메이션 중간(300ms) 쯤에 내용물 샥 교체!
            setTimeout(() => {
                if (direction === 'next') currentPageIndex++;
                else currentPageIndex--;
                
                renderCurrentPage();
            }, 300);

            // 애니메이션 종료(600ms) 후 클래스 정리
            setTimeout(() => {
                pageEl.classList.remove(turnClass);
                isAnimating = false;
            }, 600);
        }

        // 호버 시 책 끝부분 들림 효과 추가
        function addLiftEffect(side) {
            if(isAnimating) return;
            const pageEl = document.getElementById('bookPage');
            // 첫 장에서 왼쪽 넘김 방지, 마지막 장에서 오른쪽 넘김 방지
            if (side === 'left' && currentPageIndex === 0) return;
            if (side === 'right' && currentPageIndex === storyPages.length - 1) return;
            
            pageEl.classList.add(side === 'right' ? 'lift-right' : 'lift-left');
        }

        function removeLiftEffect(side) {
            const pageEl = document.getElementById('bookPage');
            pageEl.classList.remove(side === 'right' ? 'lift-right' : 'lift-left');
        }
    </script>
</body>
</html>
